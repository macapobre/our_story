<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story | Memories</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">❤️ Us</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="memories.html" class="active">Memories</a>
            <a href="gallery.html">Gallery</a>
            <a href="timeline.html">Timeline</a>
        </div>
    </nav>

    <h1 class="board-title">Memories Vault</h1>
    <p class="board-subtitle">The inside stories and silly conversations that define us.</p>

    <div class="corkboard">
        <div class="sticky-note">
            <h3>⚡ Inside Jokes</h3>
            <p id="joke-display">Loading joke...</p>
            <button class="joke-btn" onclick="generateJoke()">Next Joke</button>
        </div>
        <div class="sticky-note">
            <h3>✈️ Our Bucket List</h3>
            <div id="dynamic-bucket-list"></div>
        </div>
    </div>

    <div class="admin-form-panel">
        <h4>✨ Log a New Inside Joke</h4>
        <input type="text" id="new-joke-text" placeholder="Type something funny she said...">
        <button class="admin-btn" onclick="addNewJoke()">Save to Vault</button>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
