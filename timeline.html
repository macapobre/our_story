<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story | Timeline</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">❤️ Us</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="memories.html">Memories</a>
            <a href="gallery.html">Gallery</a>
            <a href="timeline.html" class="active">Timeline</a>
        </div>
    </nav>

    <h1 class="board-title">Our Journey Map</h1>
    <p class="board-subtitle">A walk through our history milestones together.</p>

    <div class="timeline-container" id="dynamic-timeline"></div>

    <div class="admin-form-panel">
        <h4>✨ Log a New Milestone</h4>
        <input type="text" id="time-date" placeholder="Date (e.g., October 14, 2024)">
        <input type="text" id="time-title" placeholder="Event Title">
        <input type="text" id="time-desc" placeholder="What happened on this day?">
        <select id="time-pos">
            <option value="left">Left Side</option>
            <option value="right">Right Side</option>
        </select>
        <button class="admin-btn" onclick="addNewTimeline()">Drop Pin on Timeline</button>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
